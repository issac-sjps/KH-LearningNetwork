<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相片錦集 - 高雄城市學習網絡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/default-skin/default-skin.min.css">

<style>
/* ── 全域變數 (與其他頁面保持一致) ── */
:root{ --navy:#003F88; --gold:#F5A800; --teal:#0098B4; --bg:#fff; --bg2:#F2F8FF; --text:#1A2840; --tdim:#5A6A80; --border:#C8DDEF; --shadow:0 4px 24px rgba(0,0,0,.08); --r:8px; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--navy);border-radius:3px;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--navy);height:68px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.nb{display:flex;align-items:center;gap:14px;text-decoration:none;}
.nt{color:#fff;font-family:'Noto Serif TC',serif;font-size:16px;font-weight:600;letter-spacing:.05em;line-height:1.3;}
.nt span{display:block;font-size:9px;font-family:'Space Mono',monospace;letter-spacing:.25em;opacity:.6;font-weight:400;text-transform:uppercase;}
.nl{display:flex;align-items:center;gap:4px;}
.nl a{color:rgba(255,255,255,.78);text-decoration:none;font-size:13px;padding:6px 14px;border-radius:4px;transition:all .2s;white-space:nowrap;}
.nl a:hover, .nl a.active{color:#fff;background:rgba(255,255,255,.12);}
.nl .nbtn{background:var(--gold);color:var(--navy);font-weight:700;letter-spacing:.06em;padding:7px 18px;}
.nl .nbtn:hover{background:#ffc02a;color:var(--navy);}

/* ── PAGE HERO ── */
.page-hero{background:var(--navy);padding:80px 72px;margin-top:68px;}
.ph-title{font-family:'Noto Serif TC',serif;font-size:42px;font-weight:900;color:#fff;}

/* ── 相片錦集網格 ── */
.gallery-outer { padding: 80px 72px; }
.gallery-inner { max-width: 1440px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }

/* 縮圖樣式 */
.gallery-thumbnail { position: relative; border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; background: var(--bg2); border: 1px solid var(--border); }
.gallery-thumbnail:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,63,136,.18); }
.gallery-thumbnail img { width: 100%; height: auto; display: block; object-fit: cover; aspect-ratio: 16/9; } /* 確保縮圖比例一致 */
.gallery-caption { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 100%); color: #fff; padding: 15px; font-size: 13px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.2s; }
.gallery-thumbnail:hover .gallery-caption { opacity: 1; }

/* ── FOOTER ── */
footer{background:#001F4A;padding:36px 72px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.ft-left{display:flex;align-items:center;gap:14px;}
.ft-brand{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:#fff;}
.ft-brand span{display:block;font-size:11px;font-weight:300;color:rgba(255,255,255,.5);margin-top:2px;}
.ft-copy{font-size:11px;color:rgba(255,255,255,.25);}

/* RWD */
@media(max-width:860px){
  nav{padding:0 20px;}
  .nt span {display: none;}
  .nl {display: none;}
  .nl .nbtn {padding: 5px 10px;}
  .page-hero{padding:60px 20px;}
  .ph-title{font-size:32px;}
  .gallery-outer { padding: 60px 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nb">
    <div class="nt">高雄城市學習網絡<span>Kaohsiung City Learning Network</span></div>
  </a>
  <div class="nl">
    <a href="index.html#announcements">最新公告</a>
    <a href="resources.html">學習資源</a>
    <a href="vision.html">發展願景</a>
    <a href="gallery.html" class="active">相片錦集</a>
    <a href="admin.html" class="nbtn">管理後台</a>
  </div>
</nav>

<div class="page-hero">
  <h1 class="ph-title">相片錦集</h1>
</div>

<div class="gallery-outer">
  <div class="gallery-inner" id="galleryContainer">
    </div>
</div>

<footer>
  <div class="ft-left">
    <div class="ft-brand">高雄城市學習網絡<span>Kaohsiung City Learning Network · 115年度</span></div>
  </div>
  <div class="ft-copy">© 2025 高雄市政府</div>
</footer>

<div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="pswp__bg"></div>
    <div class="pswp__scroll-wrap">
        <div class="pswp__container">
            <div class="pswp__item"></div>
            <div class="pswp__item"></div>
            <div class="pswp__item"></div>
        </div>
        <div class="pswp__ui pswp__ui--hidden">
            <div class="pswp__top-bar">
                <div class="pswp__counter"></div>
                <button class="pswp__button pswp__button--close" title="關閉 (Esc)"></button>
                <button class="pswp__button pswp__button--share" title="分享"></button>
                <button class="pswp__button pswp__button--fs" title="全螢幕"></button>
                <button class="pswp__button pswp__button--zoom" title="縮放 +/-"></button>
                <div class="pswp__preloader">
                    <div class="pswp__preloader__icn">
                      <div class="pswp__preloader__cut">
                        <div class="pswp__preloader__donut"></div>
                      </div>
                    </div>
                </div>
            </div>
            <div class="pswp__share-modal pswp__share-modal--hidden pswp__single-tap">
                <div class="pswp__share-tooltip"></div> 
            </div>
            <button class="pswp__button pswp__button--arrow--left" title="上一個 (方向鍵左)">
            </button>
            <button class="pswp__button pswp__button--arrow--right" title="下一個 (方向鍵右)">
            </button>
            <div class="pswp__caption">
                <div class="pswp__caption__center"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe-ui-default.min.js"></script>

<script>
// ── 1. 定義您的範例照片數組 ──
// 在實際整合時，此處將由 JS 或後端動態載入
const items = [
    {
        src: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=1600', // 放大後的高畫質圖片連結
        w: 1600, // 圖片寬度
        h: 900,  // 圖片高度
        title: '課程活動照片 01 - AI 智慧學習工作坊' // 圖片標題
    },
    {
        src: 'https://images.unsplash.com/photo-1543269865-cbf427effbad?q=80&w=1600',
        w: 1600,
        h: 900,
        title: '課程活動照片 02 - 淨零永續低碳生活推廣'
    },
    {
        src: 'https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=1600',
        w: 1600,
        h: 900,
        title: '課程活動照片 03 - 高齡友善福城樂齡學習中心'
    },
     {
        src: 'https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=1600',
        w: 1600,
        h: 900,
        title: '課程活動照片 04 - 社區共學網絡交流會'
    },
    {
        src: 'https://images.unsplash.com/photo-1515187029135-18ee286d815b?q=80&w=1600',
        w: 1600,
        h: 900,
        title: '課程活動照片 05 - 數位地圖學習活動現場'
    },
    {
        src: 'https://images.unsplash.com/photo-1511632765486-a01980e01a18?q=80&w=1600',
        w: 1600,
        h: 900,
        title: '課程活動照片 06 - 終身學習成果展示會'
    }
];

// ── 2. 動態生成縮圖 ──
const galleryContainer = document.getElementById('galleryContainer');

items.forEach((item, index) => {
    // 建立一個 div 包裹縮圖
    const thumbnailDiv = document.createElement('div');
    thumbnailDiv.className = 'gallery-thumbnail';
    // 點擊事件：初始化 Lightbox
    thumbnailDiv.onclick = () => openLightbox(index);

    // 建立圖片標籤 (使用 PhotoSwipe 所需的縮圖格式，可以與放大圖一致或更小)
    const img = document.createElement('img');
    img.src = item.src; // 範例直接用大圖，您可以換成更小的縮圖網址
    img.alt = item.title;

    // 建立標題
    const caption = document.createElement('div');
    caption.className = 'gallery-caption';
    caption.textContent = item.title;

    thumbnailDiv.appendChild(img);
    thumbnailDiv.appendChild(caption);
    galleryContainer.appendChild(thumbnailDiv);
});

// ── 3. 初始化並打開 Lightbox ──
const pswpElement = document.querySelectorAll('.pswp')[0];

function openLightbox(index) {
    // PhotoSwipe 的選項
    const options = {
        index: index, // 從第幾張開始
        showHideOpacity: true,
        bgOpacity: 0.9,
        loop: false, // 關閉循環
        shareEl: false // 關閉分享按鈕 (如果您需要可以打開)
    };

    // 初始化 PhotoSwipe
    const gallery = new PhotoSwipe(pswpElement, PhotoSwipeUI_Default, items, options);
    gallery.init();
}
</script>

</body>
</html>
