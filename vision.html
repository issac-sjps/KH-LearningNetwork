<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發展願景 — 高雄城市學習網絡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --navy:#003F88; --gold:#F5A800; --teal:#0098B4; --bg:#F2F8FF; --text:#1A2840; --tdim:#5A6A80; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--navy);border-radius:3px;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--navy);height:68px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.nb{display:flex;align-items:center;gap:14px;text-decoration:none;}
.nb-emblem{width:44px;height:44px;flex-shrink:0;}
.nt{color:#fff;font-family:'Noto Serif TC',serif;font-size:16px;font-weight:600;line-height:1.3;}
.nt span{display:block;font-size:9px;font-family:'Space Mono',monospace;letter-spacing:.25em;opacity:.6;font-weight:400;text-transform:uppercase;}
.nl{display:flex;align-items:center;gap:4px;}
.nl a{color:rgba(255,255,255,.78);text-decoration:none;font-size:13px;padding:6px 14px;border-radius:4px;transition:all .2s;white-space:nowrap;}
.nl a:hover,.nl a.active{color:#fff;background:rgba(255,255,255,.15);}
.nl .nbtn{background:var(--gold);color:var(--navy);font-weight:700;letter-spacing:.06em;padding:7px 18px;}
.nl .nbtn:hover{background:#ffc02a;color:var(--navy);}
.hamburger{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:8px;}

/* ── HERO & CONTENT ── */
.page-hero{margin-top:68px;background:var(--navy);padding:48px 72px;}
.ph-title{font-family:'Noto Serif TC',serif;font-size:clamp(28px,3vw,42px);font-weight:900;color:#fff;margin-bottom:8px;}
.ph-sub{font-size:14px;color:rgba(255,255,255,.65);}
.vision-wrap{padding:60px 72px;max-width:1440px;margin:0 auto;}
.vision-card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 8px 32px rgba(0,63,136,.1);text-align:center;}
.vision-img{max-width:100%;height:auto;border-radius:8px;}

/* ── FOOTER ── */
footer{background:#001F4A;padding:36px 72px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.ft-brand{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;color:#fff;}
.ft-brand span{display:block;font-size:11px;font-weight:300;color:rgba(255,255,255,.5);margin-top:2px;}
.ft-copy{font-size:11px;color:rgba(255,255,255,.25);}

@media(max-width:860px){
  nav{padding:0 20px;}
  .nl{display:none;position:absolute;top:68px;left:0;right:0;background:var(--navy);flex-direction:column;padding:16px;gap:4px;}
  nav.open .nl{display:flex;}
  .nl a{width:100%;text-align:center;padding:12px;}
  .hamburger{display:block;}
  .page-hero{padding:32px 20px;}
  .vision-wrap{padding:32px 20px;}
  footer{padding:32px 20px;flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<nav id="mainNav">
  <a href="index.html" class="nb">
    <div class="nb-emblem">
      <img src="https://issac-sjps.github.io/KH-LearningNetwork/Emblem_of_Kaohsiung_City.svg" alt="高雄市徽" width="44" height="44">
    </div>
    <div class="nt">高雄城市學習網絡<span>Kaohsiung City Learning Network</span></div>
  </a>
  <div class="nl">
    <a href="index.html#announcements">最新公告</a>
    <a href="resources.html">學習資源</a>
    <a href="vision.html" class="active">發展願景</a>
    <a href="gallery.html">相片錦集</a>
    <a href="admin.html" class="nbtn">管理後台 ▸</a>
  </div>
  <button class="hamburger" onclick="document.getElementById('mainNav').classList.toggle('open')">☰</button>
</nav>

<div class="page-hero">
  <div class="ph-title">學習型城市發展願景</div>
  <div class="ph-sub">AI 智慧城市・淨零排碳永續城市・高齡友善幸福城市</div>
</div>

<div class="vision-wrap">
  <div class="vision-card">
    <img src="vision.jpeg" alt="學習型城市發展願景" class="vision-img">
  </div>
</div>

<footer>
  <div class="ft-brand">高雄城市學習網絡<span>Kaohsiung City Learning Network · 115年度</span></div>
  <div class="ft-copy">© 2025 高雄市政府 · 9 BUREAUS · 38 DISTRICTS</div>
</footer>

<script src="chatbot.js"></script>
</body>
</html>
